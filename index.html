<!--
=============================================================
  SETUP INSTRUCTIONS
=============================================================
  1. Run the SQL migration below in your Supabase SQL Editor
  2. In Supabase Dashboard → Database → Replication, enable
     Realtime on tables: picks, app_state
  3. Fill in SUPABASE_URL and SUPABASE_ANON_KEY below
  4. Open this file directly or deploy to GitHub Pages
=============================================================

=============================================================
  SQL MIGRATION — Run this in Supabase SQL Editor
=============================================================

-- Table: participants
CREATE TABLE participants (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  name text NOT NULL,
  email text,
  phone text,
  password text,
  pick_order integer NOT NULL,
  created_at timestamptz DEFAULT now()
);

-- Table: rooms
CREATE TABLE rooms (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  room_id text UNIQUE NOT NULL,
  room_label text NOT NULL,
  house text NOT NULL CHECK (house IN ('House 1', 'House 2', 'House 3')),
  capacity integer DEFAULT 1 CHECK (capacity >= 1 AND capacity <= 4),
  image_url text,
  info_url_1 text,
  info_url_2 text,
  notes text,
  created_at timestamptz DEFAULT now()
);

-- Table: picks
CREATE TABLE picks (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  participant_id uuid REFERENCES participants(id) ON DELETE CASCADE,
  room_id uuid REFERENCES rooms(id) ON DELETE CASCADE,
  picked_at timestamptz DEFAULT now()
);

-- Table: app_state (single row)
CREATE TABLE app_state (
  id integer PRIMARY KEY DEFAULT 1,
  draft_open boolean DEFAULT false,
  current_pick_order integer DEFAULT 1
);

-- Insert default app_state row
INSERT INTO app_state (id, draft_open, current_pick_order) VALUES (1, false, 1);

-- Enable RLS (but allow all operations via anon key for simplicity)
ALTER TABLE participants ENABLE ROW LEVEL SECURITY;
ALTER TABLE rooms ENABLE ROW LEVEL SECURITY;
ALTER TABLE picks ENABLE ROW LEVEL SECURITY;
ALTER TABLE app_state ENABLE ROW LEVEL SECURITY;

CREATE POLICY "Allow all on participants" ON participants FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all on rooms" ON rooms FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all on picks" ON picks FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all on app_state" ON app_state FOR ALL USING (true) WITH CHECK (true);

-- Enable Realtime (run these or enable via Dashboard → Database → Replication)
ALTER PUBLICATION supabase_realtime ADD TABLE picks;
ALTER PUBLICATION supabase_realtime ADD TABLE app_state;

=============================================================
-->

<script>
// =====================================================
// CONFIGURATION — Fill in your Supabase credentials
// =====================================================
const SUPABASE_URL = "https://kkjsfefqamvfqgdfiucr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_z9qkxi-EyfDbVwVtDGv6aQ_YR2EgWXu";
const ADMIN_PASSWORD = "admin2024";

// =====================================================
// APP STATE
// =====================================================
let db;
let currentUser = null;  // { role: 'admin' } or { role: 'participant', participant: {...} }
let participants = [];
let rooms = [];
let picks = [];
let appState = { draft_open: false, current_pick_order: 1 };
let pickerUnlocked = false;
let pickInProgress = false;
let lastPickInfo = null; // { name, roomLabel }
let realtimeChannel = null;

// =====================================================
// INIT
// =====================================================
function initApp() {
  try {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    console.error('Supabase init error:', e);
  }
  renderLogin();
}

// =====================================================
// RENDER: LOGIN
// =====================================================
function renderLogin() {
  document.body.innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <h1>Bazel Palooza Room Draft</h1>
        <p class="subtitle">Enter your password to continue</p>
        <input type="password" id="login-pw" placeholder="Password" autocomplete="off">
        <button class="btn-login" onclick="handleLogin()">Enter</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>
  `;
  document.getElementById('login-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('login-pw').focus();
}

async function handleLogin() {
  const pw = document.getElementById('login-pw').value.trim();
  const errEl = document.getElementById('login-error');
  if (!pw) { errEl.textContent = 'Please enter a password'; return; }

  if (pw === ADMIN_PASSWORD) {
    currentUser = { role: 'admin' };
    await loadAllData();
    renderSetup();
    return;
  }

  // Check participant password
  const { data, error } = await db.from('participants').select('*');
  if (error) { errEl.textContent = 'Error connecting to database'; return; }
  if (!data || data.length === 0) {
    errEl.textContent = 'Draft not configured yet';
    return;
  }
  const match = data.find(p => p.password === pw);
  if (match) {
    currentUser = { role: 'participant', participant: match };
    participants = data.sort((a, b) => a.pick_order - b.pick_order);
    await loadAllData();
    if (!appState.draft_open) {
      errEl.textContent = 'Draft has not started yet. Please wait.';
      return;
    }
    renderDraft();
  } else {
    errEl.textContent = 'Incorrect password';
  }
}

// =====================================================
// DATA LOADING
// =====================================================
async function loadAllData() {
  if (!db) return;
  try {
    const [pRes, rRes, pkRes, asRes] = await Promise.all([
      db.from('participants').select('*').order('pick_order'),
      db.from('rooms').select('*').order('house,room_label'),
      db.from('picks').select('*'),
      db.from('app_state').select('*').eq('id', 1).single()
    ]);
    if (pRes.data) participants = pRes.data;
    if (rRes.data) rooms = rRes.data;
    if (pkRes.data) picks = pkRes.data;
    if (asRes.data) appState = asRes.data;
  } catch (e) {
    console.error('Error loading data:', e);
  }
}

// =====================================================
// SETUP PAGE
// =====================================================
function renderSetup() {
  document.body.innerHTML = `
    <div class="header">
      <h1>Bazel Palooza Room Draft</h1>
      <span style="font-size:0.85rem;color:var(--gray-300)">Admin Setup</span>
    </div>
    <div class="container">
      <div class="tabs">
        <button class="tab-btn active" data-tab="participants" onclick="switchTab('participants')">Participants</button>
        <button class="tab-btn" data-tab="rooms" onclick="switchTab('rooms')">Rooms</button>
        <button class="tab-btn" data-tab="maps" onclick="switchTab('maps')">House Maps</button>
        <button class="tab-btn" data-tab="launch" onclick="switchTab('launch')">Launch Draft</button>
      </div>
      <div id="tab-participants" class="tab-content active"></div>
      <div id="tab-rooms" class="tab-content"></div>
      <div id="tab-maps" class="tab-content"></div>
      <div id="tab-launch" class="tab-content"></div>
    </div>
  `;
  renderParticipantsTab();
  renderRoomsTab();
  renderMapsTab();
  renderLaunchTab();
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  ['participants', 'rooms', 'maps', 'launch'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
  if (name === 'launch') renderLaunchTab();
}

// --- Participants Tab ---
function renderParticipantsTab() {
  const el = document.getElementById('tab-participants');
  el.innerHTML = `
    <div class="card">
      <h3>Manage Participants</h3>
      <div class="actions-bar">
        <button class="btn btn-outline btn-small" onclick="downloadSampleParticipantsCSV()">Download Sample CSV</button>

function addParticipantRow() {
  const maxOrder = participants.reduce((m, p) => Math.max(m, p.pick_order || 0), 0);
  participants.push({ id: null, name: '', email: '', phone: '', password: '', pick_order: maxOrder + 1, _new: true });
  renderParticipantsTab();
}

function deleteParticipantRow(idx) {
  const p = participants[idx];
  if (p.id && !p._new) p._deleted = true;
  participants.splice(idx, 1);
  renderParticipantsTab();
}

async function saveParticipants() {
  const msg = document.getElementById('participants-save-msg');
  msg.textContent = 'Saving...';

  // Collect from inputs to be safe
  document.querySelectorAll('#participants-table tbody input').forEach(inp => {
    const idx = parseInt(inp.dataset.idx);
    const field = inp.dataset.field;
    if (idx >= 0 && idx < participants.length) {
      participants[idx][field] = field === 'pick_order' ? parseInt(inp.value) : inp.value;
    }
  });

  // Delete all existing then re-insert (simpler than diff)
  await db.from('picks').delete().neq('id', '00000000-0000-0000-0000-000000000000'); // clear picks first (FK)
  await db.from('participants').delete().neq('id', '00000000-0000-0000-0000-000000000000');

  const rows = participants.map(p => ({
    name: p.name,
    email: p.email,
    phone: p.phone,
    password: p.password,
    pick_order: p.pick_order
  }));

  if (rows.length > 0) {
    const { data, error } = await db.from('participants').insert(rows).select();
    if (error) { msg.textContent = 'Error: ' + error.message; return; }
    participants = data.sort((a, b) => a.pick_order - b.pick_order);
  } else {
    participants = [];
  }

  picks = [];
  msg.textContent = 'Saved!';
  renderParticipantsTab();
  setTimeout(() => { if (msg) msg.textContent = ''; }, 2000);
}

// =====================================================
// DRAFT PAGE
// =====================================================
function renderDraft() {
  pickerUnlocked = false;
  setupRealtime();

  const currentPicker = participants.find(p => p.pick_order === appState.current_pick_order);
  const nextPicker = participants.find(p => p.pick_order === appState.current_pick_order + 1);
  const draftComplete = !currentPicker || appState.current_pick_order > Math.max(...participants.map(p => p.pick_order));

  document.body.innerHTML = `
    <div class="header" id="draft-header"></div>
    <div class="container" id="draft-container"></div>
  `;
  updateDraftHeader();
  updateDraftBody();
}

function updateDraftHeader() {
  const currentPicker = participants.find(p => p.pick_order === appState.current_pick_order);
  const nextPicker = participants.find(p => p.pick_order === appState.current_pick_order + 1);
  const maxOrder = participants.length > 0 ? Math.max(...participants.map(p => p.pick_order)) : 0;
  const draftComplete = !currentPicker || appState.current_pick_order > maxOrder;

  const header = document.getElementById('draft-header');
  if (!header) return;

  header.innerHTML = `
    <h1>Bazel Palooza Room Draft</h1>
    <div class="status-center">
      ${draftComplete
        ? '<span class="draft-complete-pill">Draft Complete! All rooms assigned.</span>'
        : `<span class="pick-pill">Pick #${appState.current_pick_order} &mdash; ${currentPicker ? currentPicker.name : '?'}'s Turn</span>
           ${nextPicker ? `<span class="next-text">Next: ${nextPicker.name}</span>` : ''}`
      }
    </div>
    <a class="admin-link" onclick="promptAdmin()">Admin</a>
  `;
}

function updateDraftBody() {
  const container = document.getElementById('draft-container');
  if (!container) return;

  const currentPicker = participants.find(p => p.pick_order === appState.current_pick_order);
  const maxOrder = participants.length > 0 ? Math.max(...participants.map(p => p.pick_order)) : 0;
  const draftComplete = !currentPicker || appState.current_pick_order > maxOrder;

  let html = '';

  // Unlock Panel
  const isAdmin = currentUser && currentUser.role === 'admin';
  const pickerHasPassword = currentPicker && currentPicker.password && currentPicker.password.trim() !== '';

  // Auto-unlock if no password set OR if admin
  if (currentPicker && !pickerUnlocked && (!pickerHasPassword || isAdmin)) {
    pickerUnlocked = true;
  }

  if (appState.draft_open && !draftComplete) {
    const lastPickHtml = lastPickInfo
      ? `<div style="margin-bottom:8px;font-size:0.95rem;color:var(--gray-600)">${esc(lastPickInfo.name)} picked <strong>${esc(lastPickInfo.roomLabel)}</strong></div>`
      : '';

    if (pickerUnlocked) {
      html += `
        <div class="unlock-panel unlocked" id="unlock-panel">
          ${lastPickHtml}
          <h3>Pick #${appState.current_pick_order}: ${currentPicker ? currentPicker.name : '?'} — Select a room below!</h3>
        </div>
      `;
    } else {
      html += `
        <div class="unlock-panel locked" id="unlock-panel">
          ${lastPickHtml}
          <h3>${currentPicker ? currentPicker.name : '?'}, enter your password to pick your room:</h3>
          <div>
            <input type="password" id="unlock-pw" placeholder="Password" autocomplete="off">
            <button class="btn btn-primary" onclick="handleUnlock()">Unlock</button>
          </div>
          <div class="unlock-msg" id="unlock-msg"></div>
        </div>
      `;
    }
  }

  // House sections
  const houses = ['House 1', 'House 2', 'House 3'];
  const houseColors = { 'House 1': '#3B82F6', 'House 2': '#10B981', 'House 3': '#F59E0B' };
  const houseBadgeClass = { 'House 1': 'badge-h1', 'House 2': 'badge-h2', 'House 3': 'badge-h3' };

  houses.forEach(house => {
    const houseRooms = rooms.filter(r => r.house === house);
    if (houseRooms.length === 0) return;

    const mapKey = 'map_' + house.replace(' ', '_');
    const mapData = localStorage.getItem(mapKey);

    html += `<div class="house-section">`;
    html += `<div class="house-section-header" onclick="toggleHouse('${house}')">
      <h2 style="color:${houseColors[house]}">${house}</h2>
      <span class="toggle" id="toggle-${house.replace(' ', '')}">&#9660;</span>
    </div>`;
    html += `<div class="house-section-body" id="body-${house.replace(' ', '')}">`;

    if (mapData) {
      html += `<div class="house-map-container"><img src="${mapData}" alt="${house} Map"></div>`;
    }

    // Room legend
    html += `<div class="room-legend">`;
    houseRooms.forEach(room => {
      const roomPicks = picks.filter(pk => pk.room_id === room.id);
      const taken = roomPicks.length;
      const cap = room.capacity || 1;
      let dotClass = 'green';
      if (taken >= cap) dotClass = 'red';
      else if (taken > 0) dotClass = 'amber';

      const occupants = roomPicks.map(pk => {
        const p = participants.find(pp => pp.id === pk.participant_id);
        return p ? p.name : '?';
      });

      html += `<span class="legend-item">
        <span class="legend-dot ${dotClass}"></span>
        ${esc(room.room_label)}${occupants.length > 0 ? ' &rarr; ' + occupants.join(', ') : ''}
      </span>`;
    });
    html += `</div>`;

    // Room cards grid
    html += `<div class="room-cards-grid">`;
    houseRooms.forEach(room => {
      const roomPicks = picks.filter(pk => pk.room_id === room.id);
      const taken = roomPicks.length;
      const cap = room.capacity || 1;
      let status = 'available';
      if (taken >= cap) status = 'full';
      else if (taken > 0) status = 'partial';

      const occupants = roomPicks.map(pk => {
        const p = participants.find(pp => pp.id === pk.participant_id);
        return p ? p.name : '?';
      });

      html += `<div class="room-card ${status}">`;
      html += `<div class="room-card-img">`;
      if (room.image_url) {
        html += `<img src="${esc(room.image_url)}" alt="${esc(room.room_label)}" onerror="this.parentElement.innerHTML='&#127969;'">`;
      } else {
        html += '&#127969;';
      }
      html += `</div>`;

      html += `<div class="room-card-body">`;
      html += `<div class="room-card-label">${esc(room.room_label)}</div>`;
      html += `<div class="room-card-badges">
        <span class="badge ${houseBadgeClass[house]}">${house}</span>
        <span class="badge ${cap > 1 ? 'badge-double' : 'badge-single'}">${cap > 1 ? 'Double' : 'Single'}</span>
        ${status === 'available' ? '<span class="badge badge-available">Available</span>' : ''}
        ${status === 'partial' ? `<span class="badge badge-partial">${taken} of ${cap} taken</span>` : ''}
        ${status === 'full' ? '<span class="badge badge-taken">Taken</span>' : ''}
      </div>`;

      if (room.notes) html += `<div class="room-card-notes">${esc(room.notes)}</div>`;

      const links = [];
      if (room.info_url_1) links.push(`<a href="${esc(room.info_url_1)}" target="_blank" rel="noopener">Link 1</a>`);
      if (room.info_url_2) links.push(`<a href="${esc(room.info_url_2)}" target="_blank" rel="noopener">Link 2</a>`);
      if (links.length) html += `<div class="room-card-links">${links.join('')}</div>`;

      if (occupants.length > 0) {
        html += `<div class="room-card-occupants">${occupants.join(', ')}</div>`;
      }

      if (pickerUnlocked && status !== 'full') {
        html += `<button class="select-room-btn" onclick="executePick('${room.id}')">SELECT THIS ROOM</button>`;
      }

      html += `</div></div>`;
    });
    html += `</div></div></div>`;
  });

  // Draft Order Table
  html += `
    <div class="draft-order-section">
      <h2>Draft Order &amp; Selections</h2>
      <div class="table-wrapper">
        <table class="data-table" id="draft-order-table">
          <thead>
            <tr><th>Pick #</th><th>Name</th><th>Room</th><th>House</th><th>Type</th><th>Status</th></tr>
          </thead>
          <tbody>
  `;

  participants.forEach(p => {
    const pick = picks.find(pk => pk.participant_id === p.id);
    const room = pick ? rooms.find(r => r.id === pick.room_id) : null;
    const isCurrent = p.pick_order === appState.current_pick_order && !draftComplete;
    const isPicked = !!pick;

    let rowClass = 'draft-row-waiting';
    let statusHtml = '<span class="status-waiting">Waiting</span>';
    if (isPicked) {
      rowClass = 'draft-row-picked';
      statusHtml = '<span class="status-picked">Picked</span>';
      if (isAdmin) {
        statusHtml += ` <button class="btn btn-danger btn-small" onclick="clearPick('${p.id}')" style="margin-left:8px">Clear</button>`;
      }
    } else if (isCurrent) {
      rowClass = 'draft-row-current';
      statusHtml = '<span class="status-current">Picking Now</span>';
    }

    html += `<tr class="${rowClass}">
      <td>${p.pick_order}</td>
      <td>${esc(p.name)}</td>
      <td>${room ? esc(room.room_label) : '&mdash;'}</td>
      <td>${room ? esc(room.house) : '&mdash;'}</td>
      <td>${room ? (room.capacity > 1 ? 'Double' : 'Single') : '&mdash;'}</td>
      <td>${statusHtml}</td>
    </tr>`;
  });

  html += `</tbody></table></div>
    <div class="actions-bar" style="margin-top:12px">
      <button class="btn btn-outline btn-small" onclick="copyDraftAsText()">Copy as Text</button>
      <button class="btn btn-outline btn-small" onclick="downloadDraftCSV()">Download CSV</button>
    </div>
  </div>`;

  container.innerHTML = html;

  // Set up unlock enter key
  const unlockPw = document.getElementById('unlock-pw');
  if (unlockPw) {
    unlockPw.addEventListener('keydown', e => { if (e.key === 'Enter') handleUnlock(); });
    unlockPw.focus();
  }
}

function toggleHouse(house) {
  const id = house.replace(' ', '');
  const body = document.getElementById('body-' + id);
  const toggle = document.getElementById('toggle-' + id);
  if (body.style.display === 'none') {
    body.style.display = '';
    toggle.classList.remove('collapsed');
  } else {
    body.style.display = 'none';
    toggle.classList.add('collapsed');
  }
}

function handleUnlock() {
  const pwEl = document.getElementById('unlock-pw');
  if (!pwEl) return;
  const pw = pwEl.value.trim();
  const msg = document.getElementById('unlock-msg');
  const currentPicker = participants.find(p => p.pick_order === appState.current_pick_order);

  if (!currentPicker) { msg.textContent = 'No current picker found'; msg.style.color = 'var(--red)'; return; }

  if (currentPicker.password && pw === currentPicker.password) {
    pickerUnlocked = true;
    updateDraftBody();
  } else if (pw === ADMIN_PASSWORD) {
    // Admin can unlock for anyone
    pickerUnlocked = true;
    updateDraftBody();
  } else {
    msg.textContent = `Wrong password — only ${currentPicker.name} can pick right now.`;
    msg.style.color = 'var(--red)';
  }
}

async function executePick(roomId) {
  if (pickInProgress) return;
  pickInProgress = true;

  const currentPicker = participants.find(p => p.pick_order === appState.current_pick_order);
  if (!currentPicker) { pickInProgress = false; return; }

  // Store last pick info for display
  const pickedRoom = rooms.find(r => r.id === roomId);
  lastPickInfo = { name: currentPicker.name, roomLabel: pickedRoom ? pickedRoom.room_label : '?' };

  // Insert pick
  const { error: pickErr } = await db.from('picks').insert({
    participant_id: currentPicker.id,
    room_id: roomId
  });
  if (pickErr) { alert('Error making pick: ' + pickErr.message); pickInProgress = false; lastPickInfo = null; return; }

  // Find next unpicked participant
  let nextOrder = appState.current_pick_order + 1;
  const maxOrder = Math.max(...participants.map(p => p.pick_order));

  // Reload picks to check
  const { data: allPicks } = await db.from('picks').select('*');
  if (allPicks) picks = allPicks;

  const pickedParticipantIds = new Set(picks.map(pk => pk.participant_id));
  while (nextOrder <= maxOrder) {
    const nextP = participants.find(p => p.pick_order === nextOrder);
    if (nextP && !pickedParticipantIds.has(nextP.id)) break;
    nextOrder++;
  }

  await db.from('app_state').upsert({ id: 1, draft_open: true, current_pick_order: nextOrder });
  appState.current_pick_order = nextOrder;
  pickerUnlocked = false;
  pickInProgress = false;

  updateDraftHeader();
  updateDraftBody();
}

async function clearPick(participantId) {
  if (!db) return;
  // Delete the pick for this participant
  await db.from('picks').delete().eq('participant_id', participantId);

  // Reload picks
  const { data: allPicks } = await db.from('picks').select('*');
  if (allPicks) picks = allPicks;

  // Set current_pick_order to this participant so they can re-pick
  const p = participants.find(pp => pp.id === participantId);
  if (p) {
    await db.from('app_state').upsert({ id: 1, draft_open: true, current_pick_order: p.pick_order });
    appState.current_pick_order = p.pick_order;
  }

  lastPickInfo = null;
  pickerUnlocked = false;
  updateDraftHeader();
  updateDraftBody();
}

function promptAdmin() {
  const pw = prompt('Enter admin password:');
  if (pw === ADMIN_PASSWORD) {
    if (realtimeChannel && db) {
      db.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
    currentUser = { role: 'admin' };
    renderSetup();
  } else if (pw) {
    alert('Incorrect admin password');
  }
}

// Draft export functions
function copyDraftAsText() {
  let text = 'Pick #\tName\tRoom\tHouse\tType\tStatus\n';
  participants.forEach(p => {
    const pick = picks.find(pk => pk.participant_id === p.id);
    const room = pick ? rooms.find(r => r.id === pick.room_id) : null;
    text += `${p.pick_order}\t${p.name}\t${room ? room.room_label : '-'}\t${room ? room.house : '-'}\t${room ? (room.capacity > 1 ? 'Double' : 'Single') : '-'}\t${pick ? 'Picked' : 'Waiting'}\n`;
  });
  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
}

function downloadDraftCSV() {
  let csv = 'Pick Order,Name,Room,House,Type,Status\n';
  participants.forEach(p => {
    const pick = picks.find(pk => pk.participant_id === p.id);
    const room = pick ? rooms.find(r => r.id === pick.room_id) : null;
    csv += `${p.pick_order},"${p.name}","${room ? room.room_label : ''}","${room ? room.house : ''}","${room ? (room.capacity > 1 ? 'Double' : 'Single') : ''}","${pick ? 'Picked' : 'Waiting'}"\n`;
  });
  downloadFile('draft_results.csv', csv);
}

// =====================================================
// REALTIME
// =====================================================
function setupRealtime() {
  if (!db) return;
  if (realtimeChannel) {
    db.removeChannel(realtimeChannel);
  }

  realtimeChannel = db.channel('draft-updates')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'picks' }, async () => {
      const { data } = await db.from('picks').select('*');
      if (data) picks = data;
      updateDraftHeader();
      updateDraftBody();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state' }, async (payload) => {
      if (payload.new) {
        appState = payload.new;
      } else {
        const { data } = await db.from('app_state').select('*').eq('id', 1).single();
        if (data) appState = data;
      }
      pickerUnlocked = false;
      updateDraftHeader();
      updateDraftBody();
    })
    .subscribe();
}

// =====================================================
// UTILITIES
// =====================================================
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Init on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>

</body>
</html>
